<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Table &amp; Tales — Tonight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%}
  body{background:linear-gradient(150deg,#a6a888 0%,#8d8f72 42%,#6f7159 100%);font-family:'Inter',system-ui,sans-serif;color:#2E2E2A;padding:1.6vw}
  .display{height:100%;width:100%;background:linear-gradient(160deg,#F7F4EC 0%,#E8E4D6 100%);border-radius:1.4vw;padding:2vw 2.4vw;display:flex;flex-direction:column;
    box-shadow:inset 0 0.3vw 1vw rgba(60,55,40,.22), inset 0 -1px 0 rgba(255,255,255,.6)}
  .head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid #DAD6C8;padding-bottom:1.1vw;margin-bottom:1.6vw;flex:none}
  .head .t{font-family:'Playfair Display',Georgia,serif;font-size:3.4vw;font-weight:700;letter-spacing:.5px;line-height:1;color:#33332C;text-shadow:0 1px 0 rgba(255,255,255,.8),0 3px 6px rgba(0,0,0,.14)}
  .head .ev{text-transform:uppercase;letter-spacing:.25vw;font-size:1.15vw;font-weight:600;color:#84856F}
  .cols{flex:1;display:grid;grid-template-columns:1.1fr 1fr 1.1fr;gap:1.6vw;min-height:0}
  .card{background:linear-gradient(158deg,#FCFAF3 0%,#EFEBDF 100%);border-radius:1.1vw;padding:1.6vw 1.7vw;display:flex;flex-direction:column;min-width:0;overflow:hidden;
    box-shadow:0 0.8vw 1.6vw rgba(70,62,42,.18), 0 2px 4px rgba(70,62,42,.18), inset 0 1px 0 rgba(255,255,255,.85)}
  .ptitle{text-transform:uppercase;letter-spacing:.14vw;font-size:1.15vw;font-weight:600;color:#5A5B48;border-bottom:1px solid #E4E1D5;padding-bottom:.7vw;margin-bottom:1.2vw;flex:none;text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .ev-name{font-family:'Playfair Display',Georgia,serif;font-size:2.3vw;font-weight:700;line-height:1.1;margin-bottom:.8vw;color:#33332C;text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .ev-desc{font-size:1.15vw;color:#6E6F62;line-height:1.55;margin-bottom:1.2vw}
  .ev-when{display:inline-block;font-size:1vw;letter-spacing:.5px;text-transform:uppercase;color:#5A5B48;border:1px solid #CBC8B8;border-radius:2vw;padding:.5vw 1.2vw;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 2px 4px rgba(60,55,40,.12)}
  .rate-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center}
  .stars{font-size:3vw;color:#C9A24B;letter-spacing:.4vw;line-height:1;text-shadow:0 2px 4px rgba(120,90,20,.35)}
  .avg{font-family:'Playfair Display',Georgia,serif;font-size:5vw;font-weight:700;margin:.8vw 0 .2vw;font-variant-numeric:tabular-nums;color:#2E2E28;text-shadow:0 1px 0 rgba(255,255,255,.8),0 3px 7px rgba(0,0,0,.16)}
  .cnt{font-size:1vw;text-transform:uppercase;letter-spacing:1px;color:#84856F}
  .st{display:flex;align-items:center;gap:.8vw;padding:.85vw 0;border-bottom:1px solid #E7E3D6}
  .st:last-child{border-bottom:none}
  .dot{width:.9vw;height:.9vw;border-radius:50%;flex:none;box-shadow:inset 0 1px 1px rgba(255,255,255,.5),0 1px 2px rgba(0,0,0,.3)}
  .dot.on{background:radial-gradient(circle at 35% 30%,#8ec45f,#5d8a33)}.dot.off{background:radial-gradient(circle at 35% 30%,#d4756a,#a8453b)}
  .st .nm{flex:1;font-size:1.3vw;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#33332C}
  .st .rl{font-size:1.05vw;color:#84856F;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="display">
  <div class="head"><div class="t">TABLE &amp; TALES</div><div class="ev">Tonight</div></div>
  <div class="cols">
    <div class="card"><div class="ptitle">Event</div><div id="event"></div></div>
    <div class="card"><div class="ptitle">Guest Rating</div><div class="rate-wrap" id="rating"></div></div>
    <div class="card"><div class="ptitle">On Shift</div><div id="roster"></div></div>
  </div>
</div>
<script>
const SAMPLE={
  event:{title:'Live Jazz Night',desc:'An evening of smooth jazz and candlelit dining. Reserve your table for a night to remember.',when:'8 PM – Late'},
  rating:{avg:'4.8',stars:5,count:'126 reviews'},
  roster:[{name:'Mas Kabila',role:'Host',on:true},{name:'Vera',role:'Chef',on:true},{name:'Dino',role:'Bar',on:true},{name:'Lia',role:'Server',on:false}]
};
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function render(d){
  const e=d.event||{},r=d.rating||{},ro=d.roster||[];
  document.getElementById('event').innerHTML='<div class="ev-name">'+esc(e.title)+'</div><div class="ev-desc">'+esc(e.desc)+'</div>'+(e.when?'<span class="ev-when">'+esc(e.when)+'</span>':'');
  const sc=Math.max(0,Math.min(5,parseInt(r.stars||0,10)));
  document.getElementById('rating').innerHTML='<div class="stars">'+('★'.repeat(sc)+'☆'.repeat(5-sc))+'</div><div class="avg">'+esc(r.avg)+'</div><div class="cnt">'+esc(r.count)+'</div>';
  document.getElementById('roster').innerHTML=ro.map(s=>'<div class="st"><span class="dot '+(s.on?'on':'off')+'"></span><span class="nm">'+esc(s.name)+'</span><span class="rl">'+esc(s.role)+'</span></div>').join('');
}
function fromUrl(){try{const m=location.search.match(/[?&]d=([^&]+)/);if(m){render(JSON.parse(atob(decodeURIComponent(m[1]))));return true;}}catch(e){}return false;}
if(!fromUrl()) render(SAMPLE);
</script>
</body>
</html>

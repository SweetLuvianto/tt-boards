<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Table &amp; Tales — Tonight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(120% 120% at 50% 0%,#26261f 0%,#15140f 70%);font-family:'Inter',system-ui,sans-serif;color:#2E2E2A;display:flex;align-items:center;justify-content:center;padding:26px}
  .frame{width:100%;max-width:1140px;background:linear-gradient(150deg,#a6a888 0%,#8d8f72 38%,#6f7159 100%);border-radius:30px;padding:17px;
    box-shadow:0 36px 70px rgba(0,0,0,.55), 0 8px 18px rgba(0,0,0,.4), inset 0 2px 3px rgba(255,255,255,.45), inset 0 -4px 8px rgba(0,0,0,.4)}
  .display{background:linear-gradient(160deg,#F7F4EC 0%,#E8E4D6 100%);border-radius:17px;padding:30px 34px;display:flex;flex-direction:column;
    box-shadow:inset 0 3px 12px rgba(60,55,40,.22), inset 0 -1px 0 rgba(255,255,255,.6)}
  .head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid #DAD6C8;padding-bottom:15px;margin-bottom:22px}
  .head .t{font-family:'Playfair Display',Georgia,serif;font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:1px;line-height:1;color:#33332C;text-shadow:0 1px 0 rgba(255,255,255,.8),0 3px 6px rgba(0,0,0,.14)}
  .head .ev{text-transform:uppercase;letter-spacing:2.5px;font-size:12px;font-weight:600;color:#84856F}
  .cols{display:grid;grid-template-columns:1.1fr 1fr 1.1fr;gap:22px;flex:1}
  .card{background:linear-gradient(158deg,#FCFAF3 0%,#EFEBDF 100%);border-radius:15px;padding:20px 22px;display:flex;flex-direction:column;min-width:0;
    box-shadow:0 10px 20px rgba(70,62,42,.18), 0 2px 4px rgba(70,62,42,.20), inset 0 1px 0 rgba(255,255,255,.85), inset 0 0 0 1px rgba(255,255,255,.25)}
  .ptitle{text-transform:uppercase;letter-spacing:1.7px;font-size:12px;font-weight:600;color:#5A5B48;border-bottom:1px solid #E4E1D5;padding-bottom:9px;margin-bottom:15px;text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .ev-name{font-family:'Playfair Display',Georgia,serif;font-size:clamp(22px,3vw,32px);font-weight:700;line-height:1.1;margin-bottom:9px;color:#33332C;text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .ev-desc{font-size:14px;color:#6E6F62;line-height:1.55;margin-bottom:14px}
  .ev-when{display:inline-block;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#5A5B48;border:1px solid #CBC8B8;border-radius:20px;padding:6px 15px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 2px 4px rgba(60,55,40,.12)}
  .rate-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center}
  .stars{font-size:clamp(26px,4vw,40px);color:#C9A24B;letter-spacing:4px;line-height:1;text-shadow:0 2px 4px rgba(120,90,20,.35)}
  .avg{font-family:'Playfair Display',Georgia,serif;font-size:clamp(42px,7vw,66px);font-weight:700;margin:12px 0 2px;font-variant-numeric:tabular-nums;color:#2E2E28;text-shadow:0 1px 0 rgba(255,255,255,.8),0 3px 7px rgba(0,0,0,.16)}
  .cnt{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#84856F}
  .st{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #E7E3D6}
  .st:last-child{border-bottom:none}
  .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:inset 0 1px 1px rgba(255,255,255,.5),0 1px 2px rgba(0,0,0,.3)}
  .dot.on{background:radial-gradient(circle at 35% 30%,#8ec45f,#5d8a33)}.dot.off{background:radial-gradient(circle at 35% 30%,#d4756a,#a8453b)}
  .st .nm{flex:1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#33332C}
  .st .rl{font-size:12px;color:#84856F;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="frame"><div class="display">
  <div class="head"><div class="t">TABLE &amp; TALES</div><div class="ev">Tonight</div></div>
  <div class="cols">
    <div class="card"><div class="ptitle">Event</div><div id="event"></div></div>
    <div class="card"><div class="ptitle">Guest Rating</div><div class="rate-wrap" id="rating"></div></div>
    <div class="card"><div class="ptitle">On Shift</div><div id="roster"></div></div>
  </div>
</div></div>
<script>
const SAMPLE={
  event:{title:'Live Jazz Night',desc:'An evening of smooth jazz and candlelit dining. Reserve your table for a night to remember.',when:'8 PM – Late'},
  rating:{avg:'4.8',stars:5,count:'126 reviews'},
  roster:[{name:'Mas Kabila',role:'Host',on:true},{name:'Vera',role:'Chef',on:true},{name:'Dino',role:'Bar',on:true},{name:'Lia',role:'Server',on:false}]
};
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function render(d){
  const e=d.event||{},r=d.rating||{},ro=d.roster||[];
  document.getElementById('event').innerHTML='<div class="ev-name">'+esc(e.title)+'</div><div class="ev-desc">'+esc(e.desc)+'</div>'+(e.when?'<span class="ev-when">'+esc(e.when)+'</span>':'');
  const sc=Math.max(0,Math.min(5,parseInt(r.stars||0,10)));
  document.getElementById('rating').innerHTML='<div class="stars">'+('★'.repeat(sc)+'☆'.repeat(5-sc))+'</div><div class="avg">'+esc(r.avg)+'</div><div class="cnt">'+esc(r.count)+'</div>';
  document.getElementById('roster').innerHTML=ro.map(s=>'<div class="st"><span class="dot '+(s.on?'on':'off')+'"></span><span class="nm">'+esc(s.name)+'</span><span class="rl">'+esc(s.role)+'</span></div>').join('');
}
function fromUrl(){try{const m=location.search.match(/[?&]d=([^&]+)/);if(m){render(JSON.parse(atob(decodeURIComponent(m[1]))));return true;}}catch(e){}return false;}
if(!fromUrl()) render(SAMPLE);
</script>
</body>
</html>

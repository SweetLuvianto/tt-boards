<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Table &amp; Tales — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#EDEAE0;font-family:'Inter',system-ui,sans-serif;color:#2E2E2A;display:flex;align-items:stretch;justify-content:center;padding:20px}
  .board{width:100%;max-width:1120px;background:#F4F1E8;border:2px solid #9DA081;border-radius:24px;padding:26px 32px;display:flex;flex-direction:column}
  .head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid #D7D4C6;padding-bottom:14px;margin-bottom:20px}
  .head .t{font-family:'Playfair Display',Georgia,serif;font-size:clamp(26px,4vw,42px);font-weight:600;letter-spacing:1px;line-height:1}
  .head .ev{text-transform:uppercase;letter-spacing:2px;font-size:12px;font-weight:500;color:#7A7B6E}
  .cols{display:grid;grid-template-columns:1.35fr 1fr 1fr;gap:28px;flex:1}
  .panel{display:flex;flex-direction:column;min-width:0}
  .ptitle{display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1.7px;font-size:12px;font-weight:500;color:#3A3A34;border-bottom:1px solid #E4E1D5;padding-bottom:8px;margin-bottom:12px}
  .ptitle svg{width:15px;height:15px;stroke:#5A5B48;fill:none;stroke-width:1.6;flex:none}
  .row{display:flex;align-items:baseline;font-size:clamp(12px,1.5vw,15px);padding:6px 0}
  .row .id{width:30px;font-weight:500;flex:none}
  .row .pax{flex:1;color:#6E6F62;padding-right:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .tm{color:#9A8F7E;font-variant-numeric:tabular-nums;font-size:10px;text-transform:uppercase;letter-spacing:.5px;flex:none}
  .m{display:flex;align-items:baseline;justify-content:space-between;padding:12px 0;border-bottom:1px solid #E4E1D5}
  .m:last-child{border-bottom:none}
  .m .lab{font-size:clamp(12px,1.5vw,15px);color:#4A4A42}
  .m .val{font-family:'Playfair Display',Georgia,serif;font-size:clamp(24px,3.2vw,36px);font-weight:600;font-variant-numeric:tabular-nums}
  .g{margin:14px 0}
  .g .gl{display:flex;justify-content:space-between;font-size:12px;color:#4A4A42;margin-bottom:6px}
  .g .gl b{font-weight:600}
  .bar{height:8px;background:#E4E1D5;border-radius:6px;overflow:hidden}
  .bar i{display:block;height:100%;background:#9DA081;border-radius:6px}
</style>
</head>
<body>
<div class="board">
  <div class="head"><div class="t">OPERATIONS</div><div class="ev" id="ev">Open Shift</div></div>
  <div class="cols">
    <div class="panel"><div class="ptitle"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>Active Orders</div><div id="orders"></div></div>
    <div class="panel"><div class="ptitle">Shift Score</div><div id="score"></div></div>
    <div class="panel"><div class="ptitle">Shift Goals</div><div id="goals"></div></div>
  </div>
</div>
<script>
const SAMPLE={orders:{sections:[{rows:[{id:'#1',pax:'The Velvet Table - pasta cream',time:'WAITING'},{id:'#2',pax:'The Hearth Table - wine red',time:'WAITING'},{id:'#3',pax:'The Garden Table - salad caesar',time:'WAITING'}]}]},score:{event:'Open Shift',metrics:[{label:'Shift Score',value:'0'},{label:'Staff served',value:'0'},{label:'Loyalty guests',value:'0'}]}};
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function num(v){const n=parseInt(String(v).replace(/[^0-9-]/g,''),10);return isNaN(n)?0:n}
function render(d){
  const orders=d.orders||{}, score=d.score||{};
  document.getElementById('ev').textContent=score.event||'Open Shift';
  let rows=[];(orders.sections||[]).forEach(s=>{rows=rows.concat(s.rows||[]);});
  document.getElementById('orders').innerHTML=(rows.length?rows:[{id:'',pax:'No active orders',time:''}]).map(r=>'<div class="row"><span class="id">'+esc(r.id)+'</span><span class="pax">'+esc(r.pax)+'</span><span class="tm">'+esc(r.time||'')+'</span></div>').join('');
  const mets=score.metrics||[];
  document.getElementById('score').innerHTML=mets.map(m=>'<div class="m"><span class="lab">'+esc(m.label)+'</span><span class="val">'+esc(m.value)+'</span></div>').join('');
  const by={};mets.forEach(m=>by[String(m.label).toLowerCase()]=num(m.value));
  const goals=[{l:'Guests Served',v:by['staff served']||0,t:20},{l:'Loyalty Guests',v:by['loyalty guests']||0,t:10},{l:'Shift Score',v:by['shift score']||0,t:50}];
  document.getElementById('goals').innerHTML=goals.map(g=>{const pct=Math.max(0,Math.min(100,Math.round(g.v/g.t*100)));return '<div class="g"><div class="gl"><span>'+g.l+'</span><b>'+g.v+' / '+g.t+'</b></div><div class="bar"><i style="width:'+pct+'%"></i></div></div>';}).join('');
}
function fromUrl(){try{const m=location.search.match(/[?&]d=([^&]+)/);if(m){render(JSON.parse(atob(decodeURIComponent(m[1]))));return true;}}catch(e){}return false;}
if(!fromUrl()) render(SAMPLE);
</script>
</body>
</html>
